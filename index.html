<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Happy Women’s Day 💐</title>
<style>
  * { box-sizing: border-box; }

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  min-height:100vh;
  padding:24px;
  color:#c6c6c6;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at 15% 10%, rgba(255,214,230,.55) 0%, transparent 30%),
    radial-gradient(circle at 85% 15%, rgba(223,212,255,.45) 0%, transparent 30%),
    radial-gradient(circle at 50% 100%, rgba(255,239,220,.38) 0%, transparent 28%),
    linear-gradient(180deg, #fffefe 0%, #c6c6c6 50%, #b9b9b9 100%);
}
  .app {
    width: min(980px, 100%);
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .brand h1 {
    margin: 0;
    font-size: 22px;
  }

  .brand p {
    margin: 6px 0 0 0;
    color: #7e6f89;
  }

  .pill {
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.7);
    border: 1px solid rgba(255,255,255,.9);
  }

.card{
  position:relative;
  overflow:hidden;
  border-radius:28px;
  padding:20px;

  background: rgba(255,255,255,.10);

  border:1px solid rgba(255,255,255,.40);

  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);

  box-shadow:
    0 20px 45px rgba(193,160,190,.10),
    inset 0 1px 0 rgba(255,255,255,.45);
}

  .card > *{
  position:relative;
  z-index:1;
}

  .title {
    font-size: 20px;
    margin: 0 0 6px 0;
  }

  .subtitle, .small {
    color: #7e6f89;
  }

  .grid {
    display: grid;
    gap: 14px;
  }

  .grid.cols2 {
    grid-template-columns: repeat(2, minmax(0,1fr));
  }

  @media (max-width: 740px) {
    .grid.cols2 {
      grid-template-columns: 1fr;
    }
  }

  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .hidden {
    display: none !important;
  }

  .hr {
    height: 1px;
    background: rgba(255,255,255,.8);
    margin: 14px 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.6);
    border: 1px solid rgba(255,255,255,.85);
  }

  .score {
    font-weight: 700;
  }

  .center {
    text-align: center;
  }

  .big {
    font-size: 34px;
    margin: 10px 0 6px 0;
  }

  button, input, select {
    appearance: none;
    border: 1px solid rgba(255,255,255,.9);
    background: rgba(255,255,255,.45);
    color: ##d3d3d3;
    border-radius: 18px;
    font-weight: 650;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

button{
  cursor:pointer;
  padding:12px 14px;
  color:#c6c6c6;

  background:
    linear-gradient(135deg, rgba(255,255,255,.28), rgba(255,255,255,.14));
  border:1px solid rgba(255,255,255,.42);
  border-radius:18px;

  backdrop-filter: blur(22px) saturate(190%);
  -webkit-backdrop-filter: blur(22px) saturate(190%);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.42),
    inset 0 -1px 0 rgba(255,255,255,.05),
    0 10px 24px rgba(255,255,255,.05);

  transition:
    transform .18s ease,
    background .22s ease,
    border-color .22s ease,
    box-shadow .22s ease;
}
button{
  position:relative;
  overflow:hidden;
}

button::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.45) 0%,
      rgba(255,255,255,.12) 35%,
      rgba(255,255,255,0) 60%
    );
  opacity:.8;
}
  button:hover{
  transform: translateY(-2px);
  background:
    linear-gradient(135deg, rgba(255,255,255,.40), rgba(255,255,255,.20));
  border-color: rgba(255,255,255,.58);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.52),
    inset 0 -1px 0 rgba(255,255,255,.06),
    0 16px 30px rgb(198,198,198);
}
  button:active{
  transform: translateY(1px) scale(.99);
}
  
  input, select {
    width: 100%;
    padding: 12px 14px;
  }

.btn-accent{
  background:
    linear-gradient(
      135deg,
      rgba(255,120,178,.28),
      rgba(205,170,255,.18),
      rgba(255,255,255,.16)
    );
  border-color: rgba(255,120,178,.38);
}

.btn-accent:hover{
  background:
    linear-gradient(
      135deg,
      rgba(255,120,178,.38),
      rgba(205,170,255,.24),
      rgba(255,255,255,.22)
    );
  border-color: rgba(255,120,178,.48);
}

  .btn-ok {
    background: rgba(73,197,123,.18);
  }

  .btn-bad {
    background: rgba(255,95,122,.18);
  }

  .memory {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  @media (max-width: 520px) {
    .memory {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  .mcard,
  .ws-cell,
  .token,
  .ws-word,
  .game-box,
  .emoji-card,
  .sentence {
    background: rgba(255,255,255,.38);
    border: 1px solid rgba(255,255,255,.85);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .mcard {
    border-radius: 16px;
    padding: 14px 10px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .mcard.revealed { background: rgba(255,210,230,.55); }
  .mcard.matched { background: rgba(210,255,225,.55); }

  .question {
    font-size: 18px;
    margin: 0 0 12px 0;
  }

  .choices {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 10px;
  }

  @media (max-width: 520px) {
    .choices {
      grid-template-columns: 1fr;
    }
  }

  .choice {
    padding: 12px;
    text-align: center;
  }

  .ws-wrap {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .ws-grid {
    display: grid;
    grid-template-columns: repeat(8, 34px);
    gap: 6px;
    padding: 12px;
    border-radius: 18px;
  }

  .ws-cell {
    width: 34px;
    height: 34px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
  }

  .ws-cell.active { background: rgba(255,210,230,.55); }
  .ws-cell.found { background: rgba(210,255,225,.55); }

  .ws-list {
    min-width: 220px;
  }

  .ws-word {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 14px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .tokens {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0;
  }

  .token {
    padding: 10px 12px;
    border-radius: 999px;
    font-weight: 750;
  }

  .sentence {
    min-height: 56px;
    padding: 12px 14px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .game-box {
    padding: 14px;
    border-radius: 22px;
  }

  .scramble-word {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
    text-align: center;
    margin: 10px 0 14px 0;
  }

  .emoji-card {
    padding: 16px;
    border-radius: 20px;
  }

  .emoji-big {
    font-size: 34px;
    margin-bottom: 10px;
    text-align: center;
  }

  .audio-player {
    width: 100%;
    margin: 10px 0;
  }

  .listen-grid {
    display: grid;
    gap: 12px;
  }

  .listen-row {
    display: grid;
    grid-template-columns: 1.1fr 1fr 1fr;
    gap: 10px;
    align-items: center;
  }

  @media (max-width: 720px) {
    .listen-row {
      grid-template-columns: 1fr;
    }
  }

  .person-name {
    font-weight: 800;
  }

  canvas#confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <h1>Happy Women’s Day 💐</h1>
      <p>Click your name and complete the mini-game to unlock your greeting ✨</p>
    </div>
    <div class="pill" id="hintPill">Home</div>
  </div>

  <div class="card">
    <section id="home">
      <h2 class="title">Choose your name</h2>
      <p class="subtitle">Each button leads to a personal mini-game and a surprise.</p>
      <div class="grid cols2" id="nameButtons"></div>
      <div class="hr"></div>
    </section>

    <section id="characterPage" class="hidden">
      <div class="row" style="justify-content:space-between;">
        <div>
          <h2 class="title" id="characterTitle">—</h2>
          <p class="subtitle" id="characterIntro">—</p>
        </div>
        <div class="row">
          <span class="badge">Score: <span class="score" id="scoreLabel">0</span></span>
          <button class="btn-accent" id="btnHomeTop">Back to Home</button>
        </div>
      </div>

      <div id="gameMount"></div>

      <div class="hr"></div>
      <div class="row" style="justify-content:space-between;">
        <p class="small" id="gameTip">—</p>
        <div class="row">
          <button id="btnReset">Restart</button>
          <button class="btn-ok hidden" id="btnWin">Open greeting 💝</button>
        </div>
      </div>
    </section>

    <section id="winPage" class="hidden center">
      <div class="big" id="winBig">🎉</div>
      <h2 class="title" id="winTitle">Greeting</h2>
      <p class="subtitle" id="winText">—</p>
      <div class="row" style="justify-content:center; margin-top:10px;">
        <button class="btn-accent" id="btnBackToHome">Back to Home</button>
      </div>
      <p class="small" style="margin-top:14px;">P.S. You can also play other characters’ games 😉</p>
    </section>
  </div>
</div>

<script>
const CHARACTERS = [
  {
    id: "c1",
    name: "Anna",
    game: "memory",
    intro: "Hi Anna! Find all matching pairs to unlock your message 💐",
    win: "Anna, wishing you a bright spring full of joy, inspiration, and warm moments. Happy Women’s Day! 💖"
  },
  {
    id: "c2",
    name: "Olesya",
    game: "grammar",
    intro: "Hi Olesya! Choose the correct grammar option 🎈",
    win: "Olesya, may your days be filled with smiles, energy, and lovely surprises. Happy Women’s Day! 🌷"
  },
  {
    id: "c3",
    name: "Sonya",
    game: "wordsearch",
    intro: "Hi Sonya! Find the hidden words in the grid 🔎",
    win: "Sonya, thank you for your kindness and dedication. Wishing you happiness and beautiful moments! 🌸"
  },
  {
    id: "c4",
    name: "Anastasia",
    game: "compliment",
    intro: "Hi Anastasia! Build both compliments to unlock your greeting ✨",
    win: "Anastasia, may you always be surrounded by care, support, and love. Happy Women’s Day! 💐"
  },
  {
    id: "c5",
    name: "Kira)",
    game: "listeningmatch",
    intro: "HEY Kira! I hope you listen carefully and choose the correct answer as always 🎧",
    win: "Kira, I wish you joy, warmth, wonderful people, and lovely surprises this spring. Happy International Women's Day! 🌷"
  },
  {
    id: "c6",
    name: "Nadiya",
    game: "unscramble",
    intro: "Hi Nadiya! Unscramble the words one by one 🔤",
    win: "Nadiya, may your day be bright, kind, and full of smiles. Happy Women’s Day! 🌸"
  },
  {
    id: "c7",
    name: "Vlada",
    game: "emoji",
    intro: "Hi Vlada! Match the emoji to the correct word 😀",
    win: "Vlada, wishing you beauty, inspiration, and lots of happy moments. Happy Women’s Day! 💖"
  },
  {
    id: "c8",
    name: "Kate",
    game: "sentence",
    intro: "Hi Kate! Put the words in the correct order 🧩",
    win: "Kate, may every day bring you joy, warmth, and lovely memories. Happy Women’s Day! 💐"
  },
  {
    id: "c9",
    name: "Daryna",
    game: "guess",
    intro: "Hi Daryna! Guess the word from the clue ❓",
    win: "Daryna, wishing you happiness, inspiration, and a beautiful spring mood. Happy Women’s Day! 🌷"
  }
];

/* UI */
const el = (id) => document.getElementById(id);

const home = el("home");
const characterPage = el("characterPage");
const winPage = el("winPage");
const hintPill = el("hintPill");

const nameButtons = el("nameButtons");
const characterTitle = el("characterTitle");
const characterIntro = el("characterIntro");
const scoreLabel = el("scoreLabel");
const gameMount = el("gameMount");
const gameTip = el("gameTip");
const btnReset = el("btnReset");
const btnWin = el("btnWin");
const btnHomeTop = el("btnHomeTop");
const btnBackToHome = el("btnBackToHome");

let currentCharacter = null;
let currentGame = null;

function show(view){
  home.classList.toggle("hidden", view !== "home");
  characterPage.classList.toggle("hidden", view !== "character");
  winPage.classList.toggle("hidden", view !== "win");
  hintPill.textContent = view === "home" ? "Home" : view === "character" ? "Game" : "Greeting";
}

function goHome(){
  stopConfetti();
  currentCharacter = null;
  currentGame?.destroy?.();
  currentGame = null;
  show("home");
}

function goCharacter(person){
  stopConfetti();
  currentCharacter = person;
  characterTitle.textContent = person.name;
  characterIntro.textContent = person.intro;
  scoreLabel.textContent = "0";
  btnWin.classList.add("hidden");
  gameMount.innerHTML = "";
  show("character");

  if (person.game === "memory") currentGame = mountMemoryGame(person);
  if (person.game === "grammar") currentGame = mountGrammarGame(person);
  if (person.game === "wordsearch") currentGame = mountWordSearchGame(person);
  if (person.game === "compliment") currentGame = mountComplimentGame(person);
  if (person.game === "listeningmatch") currentGame = mountListeningMatchGame(person);
  if (person.game === "unscramble") currentGame = mountUnscrambleGame(person);
  if (person.game === "emoji") currentGame = mountEmojiGame(person);
  if (person.game === "sentence") currentGame = mountSentenceGame(person);
  if (person.game === "guess") currentGame = mountGuessGame(person);
}

function goWin(){
  show("win");
  el("winBig").textContent = "🎉💐✨";
  el("winTitle").textContent = `Happy Women’s Day, ${currentCharacter.name}!`;
  el("winText").textContent = currentCharacter.win;
  fireConfetti(140);
}

function renderHome(){
  nameButtons.innerHTML = "";
  CHARACTERS.forEach((person) => {
    const b = document.createElement("button");
    b.className = "btn-accent";
    b.textContent = person.name;
    b.onclick = () => goCharacter(person);
    nameButtons.appendChild(b);
  });
}

btnHomeTop.onclick = goHome;
btnBackToHome.onclick = goHome;
btnWin.onclick = goWin;
btnReset.onclick = () => currentGame?.reset?.();

function setScore(n){ scoreLabel.textContent = String(n); }
function unlockWin(){ btnWin.classList.remove("hidden"); fireConfetti(40); }

/* Game 1: Memory */
function mountMemoryGame(t){
  gameTip.textContent = "Game: reveal and match all pairs (EN ↔ UA).";

  const words = [
    ["spring","весна"],
    ["flower","квітка"],
    ["smile","посмішка"],
    ["joy","радість"],
    ["love","кохання"],
    ["kindness","доброта"],
  ];

  const deck = [];
  words.forEach((p, i) => {
    deck.push({ pair:i, text:p[0] });
    deck.push({ pair:i, text:p[1] });
  });
  shuffle(deck);

  let first = null;
  let lock = false;
  let matched = 0;
  let moves = 0;

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <span class="badge">Pairs: <span class="score" id="pairsDone">0</span> / ${words.length}</span>
      <span class="badge">Moves: <span class="score" id="moves">0</span></span>
    </div>
    <div class="memory" id="memGrid"></div>
  `;
  gameMount.appendChild(wrap);

  const memGrid = wrap.querySelector("#memGrid");
  const pairsDone = wrap.querySelector("#pairsDone");
  const movesEl = wrap.querySelector("#moves");

  deck.forEach((card, idx) => {
    const c = document.createElement("div");
    c.className = "mcard";
    c.textContent = "❀";
    c.onclick = () => flip(idx, c);
    memGrid.appendChild(c);
  });

  function flip(idx, node){
    if (lock) return;
    const card = deck[idx];
    if (card.matched || card.revealed) return;

    card.revealed = true;
    node.classList.add("revealed");
    node.textContent = card.text;

    if (!first){
      first = { idx, node, card };
      return;
    }

    moves++;
    movesEl.textContent = String(moves);

    if (first.card.pair === card.pair && first.idx !== idx){
      card.matched = true;
      first.card.matched = true;

      node.classList.remove("revealed");
      first.node.classList.remove("revealed");
      node.classList.add("matched");
      first.node.classList.add("matched");

      matched++;
      pairsDone.textContent = String(matched);
      setScore(matched);
      first = null;

      if (matched === words.length) unlockWin();
    } else {
      lock = true;
      setTimeout(() => {
        card.revealed = false;
        first.card.revealed = false;
        node.classList.remove("revealed");
        first.node.classList.remove("revealed");
        node.textContent = "❀";
        first.node.textContent = "❀";
        first = null;
        lock = false;
      }, 650);
    }
  }

  function reset(){ goCharacter(t); }
  return { reset };
}

/* Game 2: Grammar */
function mountGrammarGame(t){
  gameTip.textContent = "Game: choose the correct answer. Score 5/7 to win!";

  const qs = [
    { q:"She ___ English every day.", a:"studies", opts:["study","studies","studying"] },
    { q:"I have ___ idea.", a:"an", opts:["a","an","the"] },
    { q:"They ___ to Kyiv last year.", a:"went", opts:["go","went","gone"] },
    { q:"If it rains, we ___ at home.", a:"will stay", opts:["stay","stayed","will stay"] },
    { q:"He is ___ than me.", a:"taller", opts:["tall","taller","the tallest"] },
    { q:"We ___ just finished the lesson.", a:"have", opts:["have","has","had"] },
    { q:"There isn’t ___ milk.", a:"any", opts:["some","any","many"] },
  ];

  let i = 0;
  let score = 0;

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <span class="badge">Question: <span class="score" id="qi">1</span> / ${qs.length}</span>
      <span class="badge">Correct: <span class="score" id="gs">0</span></span>
    </div>
    <p class="question" id="qtext"></p>
    <div class="choices" id="choices"></div>
    <p class="small" id="feedback"></p>
  `;
  gameMount.appendChild(wrap);

  const qi = wrap.querySelector("#qi");
  const gs = wrap.querySelector("#gs");
  const qtext = wrap.querySelector("#qtext");
  const choices = wrap.querySelector("#choices");
  const feedback = wrap.querySelector("#feedback");

  function render(){
    qi.textContent = String(i+1);
    gs.textContent = String(score);
    setScore(score);
    feedback.textContent = "";
    qtext.textContent = qs[i].q;
    choices.innerHTML = "";
    qs[i].opts.forEach(opt => {
      const b = document.createElement("button");
      b.className = "choice";
      b.textContent = opt;
      b.onclick = () => pick(opt, b);
      choices.appendChild(b);
    });
  }

  function pick(opt, btn){
    const ok = opt === qs[i].a;
    if (ok){
      btn.classList.add("btn-ok");
      feedback.textContent = "✅ Nice! Correct.";
      score++;
      gs.textContent = String(score);
      setScore(score);
    } else {
      btn.classList.add("btn-bad");
      feedback.textContent = `❌ Oops! Correct answer: ${qs[i].a}`;
    }

    [...choices.querySelectorAll("button")].forEach(x => x.disabled = true);

    setTimeout(() => {
      i++;
      if (i >= qs.length){
        if (score >= 5) unlockWin();
        else feedback.textContent = "Almost! Press Restart and try again ✨";
        return;
      }
      render();
    }, 750);
  }

  function reset(){
    i = 0;
    score = 0;
    btnWin.classList.add("hidden");
    render();
  }

  render();
  return { reset };
}

/* Game 3: Word Search */
function mountWordSearchGame(t){
  gameTip.textContent = "Game: click letters to build a word, then press Check.";

  const targetWords = ["MARCH","FLOWER","JOY","SMILE"];
  const size = 8;

  const gridRows = [
    "MARCHXQZ",
    "ABFLOWER",
    "QJOYTTTT",
    "SMILEPPP",
    "KLMNOPQR",
    "STUVWXYZ",
    "ABCDEFGH",
    "IJKLMNOP",
  ].map(r => r.split(""));

  const found = new Set();
  let current = "";
  let score = 0;

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <span class="badge">Found: <span class="score" id="fd">0</span> / ${targetWords.length}</span>
      <span class="badge">Word: <span class="score" id="cur">—</span></span>
    </div>
    <div class="ws-wrap">
      <div>
        <div class="ws-grid" id="wsGrid"></div>
        <div class="row" style="margin-top:10px;">
          <button class="btn-accent" id="checkBtn">Check</button>
          <button id="clearBtn">Clear</button>
        </div>
        <p class="small" id="wsMsg"></p>
      </div>
      <div class="ws-list" id="wsList"></div>
    </div>
  `;
  gameMount.appendChild(wrap);

  const wsGrid = wrap.querySelector("#wsGrid");
  const wsList = wrap.querySelector("#wsList");
  const fd = wrap.querySelector("#fd");
  const cur = wrap.querySelector("#cur");
  const wsMsg = wrap.querySelector("#wsMsg");

  function renderList(){
    wsList.innerHTML = `<p class="small" style="margin:0 0 10px 0;">Words to find:</p>`;
    targetWords.forEach(w => {
      const item = document.createElement("div");
      item.className = "ws-word" + (found.has(w) ? " done" : "");
      item.innerHTML = `<span>${w}</span><span>${found.has(w) ? "✅" : "⬜"}</span>`;
      wsList.appendChild(item);
    });
  }

  function renderGrid(){
    wsGrid.innerHTML = "";
    for (let r=0; r<size; r++){
      for (let c=0; c<size; c++){
        const cell = document.createElement("div");
        cell.className = "ws-cell";
        cell.textContent = gridRows[r][c];
        cell.onclick = () => {
          cell.classList.add("active");
          current += cell.textContent;
          cur.textContent = current || "—";
        };
        wsGrid.appendChild(cell);
      }
    }
  }

  function clearSelection(){
    current = "";
    cur.textContent = "—";
    wsMsg.textContent = "";
    wsGrid.querySelectorAll(".ws-cell.active").forEach(x => x.classList.remove("active"));
  }

  wrap.querySelector("#clearBtn").onclick = clearSelection;

  wrap.querySelector("#checkBtn").onclick = () => {
    const w = current.toUpperCase();
    if (targetWords.includes(w) && !found.has(w)){
      found.add(w);
      score = found.size;
      fd.textContent = String(found.size);
      setScore(score);
      wsMsg.textContent = `✅ Found: ${w}!`;
      wsGrid.querySelectorAll(".ws-cell.active").forEach(x => {
        x.classList.remove("active");
        x.classList.add("found");
      });
      renderList();
      current = "";
      cur.textContent = "—";
      if (found.size === targetWords.length) unlockWin();
    } else if (found.has(w)) {
      wsMsg.textContent = "⚠️ You already found that word.";
      clearSelection();
    } else {
      wsMsg.textContent = "❌ Not a target word. Try again!";
      clearSelection();
    }
  };

  function reset(){
    found.clear();
    score = 0;
    fd.textContent = "0";
    setScore(0);
    btnWin.classList.add("hidden");
    renderGrid();
    renderList();
    clearSelection();
  }

  renderGrid();
  renderList();
  return { reset };
}

/* Game 4: Compliment Builder */
function mountComplimentGame(t){
  gameTip.textContent = "Game: build BOTH compliments in the correct order.";

  const targets = [
    ["Сьогодні","ти","справді","надихаєш","нас","!"],
    ["Твоя","доброта","робить","день","кращим","!"]
  ];

  const extras = ["always","so","kind","amazing","bright","happy"];
  let stage = 0;
  let built = [];
  let score = 0;
  let pool = shuffle([...targets[stage], ...extras]);

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <span class="badge">Stage: <span class="score" id="stageNo">1</span> / ${targets.length}</span>
      <span class="badge">Done: <span class="score" id="doneNo">0</span> / ${targets.length}</span>
    </div>
    <p class="small" style="margin:0 0 8px 0;">
      Goal: <span class="badge"><span id="goalText">${targets[0].join(" ")}</span></span>
    </p>
    <div class="sentence" id="sentence"></div>
    <div class="row" style="margin-top:10px;">
      <button id="undoBtn">Undo</button>
      <button class="btn-accent" id="checkBtn2">Check</button>
      <span class="badge">Built: <span class="score" id="builtCount">0</span> / <span id="goalLen">${targets[0].length}</span></span>
    </div>
    <div class="tokens" id="tokens"></div>
    <p class="small" id="msg2"></p>
  `;
  gameMount.appendChild(wrap);

  const sentence = wrap.querySelector("#sentence");
  const tokens = wrap.querySelector("#tokens");
  const msg2 = wrap.querySelector("#msg2");
  const builtCount = wrap.querySelector("#builtCount");
  const stageNo = wrap.querySelector("#stageNo");
  const doneNo = wrap.querySelector("#doneNo");
  const goalText = wrap.querySelector("#goalText");
  const goalLen = wrap.querySelector("#goalLen");

  function currentTarget(){
    return targets[stage];
  }

  function refreshPool(){
    pool = shuffle([...currentTarget(), ...extras]);
  }

  function render(){
    sentence.innerHTML = built.length ? "" : "<span class='muted'>Click words below…</span>";
    built.forEach(w => {
      const s = document.createElement("span");
      s.className = "token";
      s.textContent = w;
      sentence.appendChild(s);
    });

    tokens.innerHTML = "";
    pool.forEach(w => {
      const b = document.createElement("button");
      b.className = "token";
      b.textContent = w;
      b.onclick = () => addWord(w);
      tokens.appendChild(b);
    });

    stageNo.textContent = String(stage + 1);
    doneNo.textContent = String(score);
    goalText.textContent = currentTarget().join(" ");
    goalLen.textContent = String(currentTarget().length);
    builtCount.textContent = String(built.length);
    setScore(score);
  }

  function addWord(w){
    if (built.length >= currentTarget().length) return;
    built.push(w);
    msg2.textContent = "";
    render();
  }

  wrap.querySelector("#undoBtn").onclick = () => {
    built.pop();
    msg2.textContent = "";
    render();
  };

  wrap.querySelector("#checkBtn2").onclick = () => {
    const ok = built.join(" ") === currentTarget().join(" ");
    if (!ok){
      msg2.textContent = "❌ Almost! Try a different order 🙂";
      return;
    }

    score++;
    setScore(score);

    if (stage === targets.length - 1){
      msg2.textContent = "✅ Perfect! Both compliments assembled.";
      unlockWin();
      tokens.querySelectorAll("button").forEach(b => b.disabled = true);
      return;
    }

    msg2.textContent = "✅ Great! Moving to the second compliment...";
    stage++;
    built = [];
    refreshPool();
    render();
  };

  function reset(){
    stage = 0;
    built = [];
    score = 0;
    btnWin.classList.add("hidden");
    refreshPool();
    render();
    msg2.textContent = "";
  }

  render();
  return { reset };
}

  wrap.innerHTML = `

        <button class="btn-accent" id="unscrambleCheck">Check</button>
      </div>

  const scrambled = wrap.querySelector("#scrambled");
  const input = wrap.querySelector("#unscrambleInput");

/* Utils */
function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* Confetti */
const confettiCanvas = document.getElementById("confetti");
const ctx = confettiCanvas.getContext("2d");
let confettiPieces = [];
let confettiTimer = null;

function resizeCanvas(){
  confettiCanvas.width = window.innerWidth * devicePixelRatio;
  confettiCanvas.height = window.innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function fireConfetti(count=80){
  const w = window.innerWidth, h = window.innerHeight;
  for (let i=0; i<count; i++){
    confettiPieces.push({
      x: Math.random() * w,
      y: -20 - Math.random()*h*0.2,
      r: 3 + Math.random()*5,
      vx: -2 + Math.random()*4,
      vy: 2 + Math.random()*4,
      rot: Math.random()*Math.PI,
      vr: -0.15 + Math.random()*0.3,
      life: 120 + Math.random()*80,
      hue: 320 + Math.random()*80,
    });
  }
  if (!confettiTimer) confettiTimer = requestAnimationFrame(tickConfetti);
}

function tickConfetti(){
  ctx.clearRect(0,0, window.innerWidth, window.innerHeight);
  const h = window.innerHeight;

  confettiPieces.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.vy += 0.02;
    p.life -= 1;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = `hsl(${p.hue} 90% 65% / 0.95)`;
    ctx.fillRect(-p.r, -p.r, p.r*2, p.r*2);
    ctx.restore();
  });

  confettiPieces = confettiPieces.filter(p => p.life > 0 && p.y < h + 60);
  if (confettiPieces.length > 0) confettiTimer = requestAnimationFrame(tickConfetti);
  else confettiTimer = null;
}

function stopConfetti(){
  confettiPieces = [];
  if (confettiTimer){
    cancelAnimationFrame(confettiTimer);
    confettiTimer = null;
  }
  ctx.clearRect(0,0, window.innerWidth, window.innerHeight);
}
